services:
  uor-passport:
    image: ghcr.io/humuhumu33/mcp-uor-server:latest
    ports:
      - "3000:3000"
    environment:
      - UOR_TRANSPORT=http
      - UOR_PASSPORT_ENABLED=true
      - UOR_SIGNING=disabled
      - UOR_USE_JCS=true
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - RUST_LOG=info
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
